---
- name: Validate ShopNow management host configuration
  hosts: management
  become: false
  gather_facts: false

  tasks:
  - name: Check Docker client
    ansible.builtin.command: docker --version
    register: docker_version
    changed_when: false

  - name: Check kubectl client
    ansible.builtin.command: kubectl version --client=true --output=yaml
    register: kubectl_version_check
    changed_when: false

  - name: Check AWS CLI
    ansible.builtin.command: aws --version
    register: aws_cli_version
    changed_when: false

  - name: Print installed tool versions
    ansible.builtin.debug:
      msg:
      - "{{ docker_version.stdout }}"
      - "{{ kubectl_version_check.stdout_lines[0] | default('kubectl client detected') }}"
      - "{{ aws_cli_version.stdout }}"
