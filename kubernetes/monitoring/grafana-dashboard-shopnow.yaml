apiVersion: v1
kind: ConfigMap
metadata:
  name: shopnow-grafana-dashboard
  namespace: monitor-ns
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: shopnow
data:
  shopnow-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "fieldConfig": {"defaults": {"unit": "none"}, "overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "targets": [
            {"expr": "sum(up{namespace=\"shopnow-ns\"})", "legendFormat": "Up Targets", "refId": "A"}
          ],
          "title": "ShopNow Up Targets",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["shopnow", "prometheus"],
      "templating": {"list": []},
      "time": {"from": "now-30m", "to": "now"},
      "title": "ShopNow Overview",
      "uid": "shopnow-overview",
      "version": 1
    }
